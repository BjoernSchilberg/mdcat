[graph]
targets = [
  { triple = 'x86_64-unknown-linux-gnu' },
  { triple = 'x86_64-apple-darwin' },
  { triple = 'x86_64-pc-windows-msvc' },
]

[advisories]
version = 2
ignore = [
    # paste is unmaintained (RUSTSEC-2024-0436), but there is no safe upgrade
    # available. It is a transitive dependency via rav1e -> ravif -> image.
    "RUSTSEC-2024-0436",
    # bincode is unmaintained (RUSTSEC-2025-0141), but there is no safe upgrade
    # available. It is a transitive dependency via syntect.
    "RUSTSEC-2025-0141",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "MPL-2.0",
    "ISC",
    "Zlib",
    "Unicode-3.0",
]
